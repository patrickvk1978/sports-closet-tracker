name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────
  # Tournament Tracker — triggers on app or shared package changes
  # ──────────────────────────────────────────────────────────────
  deploy-tournament:
    name: Deploy Tournament Tracker
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'apps/tournament-tracker/') ||
      contains(github.event.head_commit.modified, 'packages/shared/') ||
      contains(github.event.head_commit.modified, 'packages/ui/')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tournament-tracker
        run: pnpm --filter tournament-tracker build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_TOURNAMENT }}
          working-directory: apps/tournament-tracker
          vercel-args: '--prod'

  # ──────────────────────────────────────────────────────────────
  # On the Clock (Draft)
  # ──────────────────────────────────────────────────────────────
  deploy-draft:
    name: Deploy On the Clock
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'apps/on-the-clock/') ||
      contains(github.event.head_commit.modified, 'packages/shared/') ||
      contains(github.event.head_commit.modified, 'packages/ui/')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build on-the-clock
        run: pnpm --filter on-the-clock build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DRAFT }}
          working-directory: apps/on-the-clock
          vercel-args: '--prod'

  # ──────────────────────────────────────────────────────────────
  # NBA Playoffs
  # ──────────────────────────────────────────────────────────────
  deploy-nba:
    name: Deploy NBA Playoffs
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'apps/nba-playoffs/') ||
      contains(github.event.head_commit.modified, 'packages/shared/') ||
      contains(github.event.head_commit.modified, 'packages/ui/')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build nba-playoffs
        run: pnpm --filter nba-playoffs build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_NBA }}
          working-directory: apps/nba-playoffs
          vercel-args: '--prod'
